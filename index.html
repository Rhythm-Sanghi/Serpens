<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SERPENS // ULTIMATE</title>
    <script type="module" crossorigin src="./assets/index-CIQnU2ky.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DBgAEeqb.css">
  </head>
  <body>
    <div id="app">
      <div id="ui-layer">
        <div id="header">
          <div id="score">SERPENS // 000000</div>
          <div id="indicators">
            <div id="ai-indicator" class="hidden">AI_ACTIVE</div>
            <div id="multiplayer-indicator" class="hidden">MP_CONNECTED</div>
          </div>
        </div>
        
        <div id="score-mini">000000</div>
        
        <div id="toast-container"></div>

        <div id="hud-controls" class="hidden">
          <button id="hud-rewind-btn" class="hud-btn" title="Hold to Rewind (R)">
            <span class="hud-sym">◀◀</span>
            <span class="hud-txt">REWIND</span>
          </button>
          <button id="hud-ai-btn" class="hud-btn" title="Toggle AI Pilot (P)">
            <span class="hud-sym">AI</span>
            <span class="hud-txt">PILOT</span>
          </button>
        </div>
      </div>

      <div id="game-container">
        <canvas id="game-canvas"></canvas>
      </div>

      <div id="menu-overlay" class="glass-panel">
        <div id="menu-landing" class="menu-tier">
          <h1 id="title-ticker">SERPENS</h1>
          <div class="menu-actions">
            <button id="start-btn" class="primary-btn">INITIATE_SYSTEM</button>
            <button id="config-btn" class="secondary-btn">CONFIGURATION</button>
            <button id="vault-btn" class="secondary-btn">DATA_VAULT</button>
          </div>
        </div>

        <div id="menu-config" class="menu-tier hidden">
          <div class="config-header">
            <button id="back-to-menu" class="icon-btn">←</button>
            <h2>SYSTEM_CONFIGURATION</h2>
          </div>
          
          <div class="config-groups">
            <div class="config-group">
              <h3>[ GAMEPLAY_LOGIC ]</h3>
              <label class="toggle-row">
                <span>AUTOPILOT (P)</span>
                <input type="checkbox" id="toggle-autopilot">
                <span class="slider"></span>
              </label>
              <label class="toggle-row">
                <span>BIOME_MUTATOR</span>
                <input type="checkbox" id="toggle-biomes" checked>
                <span class="slider"></span>
              </label>
              <label class="toggle-row">
                <span>TIME_REWIND (R)</span>
                <input type="checkbox" id="toggle-rewind" checked>
                <span class="slider"></span>
              </label>
            </div>

            <div class="config-group">
              <h3>[ HARDWARE_LAYER ]</h3>
              <label class="toggle-row">
                <span>HAPTIC_FEEDBACK</span>
                <input type="checkbox" id="toggle-haptics" checked>
                <span class="slider"></span>
              </label>
              <label class="toggle-row">
                <span>MULTIPLAYER</span>
                <input type="checkbox" id="toggle-multiplayer">
                <span class="slider"></span>
              </label>
              <label class="toggle-row">
                <span>AUDIO_SYNTH</span>
                <input type="checkbox" id="toggle-audio" checked>
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>

        <div id="menu-vault" class="menu-tier hidden">
          <div class="vault-header">
            <button id="vault-back-btn" class="vault-back-btn">◀ RETURN</button>
            <div class="vault-title-box">
              <h2>DATA_VAULT // DECK</h2>
              <div class="vault-subtitle">[ SECURE BIOMETRIC ARCHIVE ]</div>
            </div>
          </div>
          
          <div class="vault-tabs-container">
            <div class="vault-tabs">
              <button id="tab-telemetry" class="vault-tab active">TELEMETRY</button>
              <button id="tab-palettes" class="vault-tab">ACHIEVEMENTS</button>
            </div>
          </div>

          <div id="vault-telemetry-view" class="vault-view">
            <div class="telemetry-grid">
              <div class="tel-card"><span class="tel-label"><span class="tel-icon">🏆</span> HIGH_SCORE</span><span id="tel-high-score" class="tel-val">0</span></div>
              <div class="tel-card"><span class="tel-label"><span class="tel-icon">🛰️</span> TOTAL_METERS</span><span id="tel-total-meters" class="tel-val">0 U</span></div>
              <div class="tel-card"><span class="tel-label"><span class="tel-icon">⚡</span> APEX_SPEED</span><span id="tel-apex-speed" class="tel-val">0.0 U/S</span></div>
              <div class="tel-card"><span class="tel-label"><span class="tel-icon">⚠️</span> NEAR_MISSES</span><span id="tel-near-misses" class="tel-val">0</span></div>
              <div class="tel-card"><span class="tel-label"><span class="tel-icon">🌌</span> VOID_ESCAPES</span><span id="tel-void-escapes" class="tel-val">0</span></div>
              <div class="tel-card"><span class="tel-label"><span class="tel-icon">⏱️</span> SESSIONS</span><span id="tel-sessions" class="tel-val">0</span></div>
            </div>
          </div>

          <div id="vault-palettes-view" class="vault-view hidden">
            <div id="palettes-grid" class="palettes-grid">
              <!-- Dynamically populated palette cards -->
            </div>
          </div>
        </div>
      </div>

      <div id="launch-sequence" class="hidden">
        <div class="loading-telemetry">
          <div id="loading-text">STABILIZING_GRID...</div>
          <div class="loading-bar-container">
            <div id="loading-progress"></div>
          </div>
        </div>
      </div>

    </div>
  </body>
</html>
